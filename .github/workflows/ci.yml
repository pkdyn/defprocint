name: CI

on:
  push:
  pull_request:

# Least privilege: tests never need write. On a public repo this means a fork's
# pull-request run gets a read-only token and can do nothing beyond run the suite.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run tests (offline; fixtures + boundary + ethics gates)
        run: python -m pytest -q
