name: scrape

# Twice daily (01:00 & 13:00 UTC ≈ 06:30 & 18:30 IST). The runner has open
# internet; only this job reaches defproc.gov.in — never the deployed site.
on:
  schedule:
    - cron: "0 1,13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Scrape live tenders -> web/tenders.json
        env:
          DEFPROC_GEOCODE_ONLINE: "1"   # free OSM Nominatim, cached; scraper-side only
        run: python -m scraper.pipeline --out web/tenders.json --retention-hours 72
      - name: Build LPP reference index -> web/lpp-index.json
        run: python -m scraper.index_lpp --archive --enrich-cap 30   # full catalogue (no per-org cap)
      - name: Sanity-check boundary stays sovereign
        run: python tests/test_boundary.py
      - name: Commit data if changed
        run: |
          git config user.name "defproc-monitor[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add web/tenders.json web/lpp-index.json data/geocache.json
          if git diff --cached --quiet; then
            echo "no data change"
          else
            git commit -m "data: scheduled scrape $(date -u +%FT%TZ)"
            git push
          fi
